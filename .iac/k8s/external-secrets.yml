apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cezzis-com-cocktails-aisearch-secrets
  namespace: cezzis
  labels:
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cezzis-prd-secret-store
    kind: SecretStore
  target:
    name: cezzis-com-cocktails-aisearch-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        HUGGINGFACE_API_TOKEN: "{{ .embeddingsApiKey }}"
        RERANKER_API_KEY: "{{ .rerankerApiKey }}"
        SPLADE_API_KEY: "{{ .spladeApiKey }}"
  data:
    - secretKey: embeddingsApiKey
      remoteRef:
        key: cocktails-aisearch-tei-embeddings-api-key
    - secretKey: rerankerApiKey
      remoteRef:
        key: cocktails-aisearch-tei-reranker-api-key
    - secretKey: spladeApiKey
      remoteRef:
        key: cocktails-aisearch-tei-splade-api-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cezzis-com-cocktails-aisearch-shared-secrets
  namespace: cezzis
  labels:
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: shared-secret-store
    kind: SecretStore
  target:
    name: cezzis-com-cocktails-aisearch-shared-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OTEL_OTLP_AUTH_HEADER: "Bearer {{ .otelApiKey }}"
  data:
    - secretKey: otelApiKey
      remoteRef:
        key: otel-collector-api-key-onprem
